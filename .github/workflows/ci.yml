# GitHub Actions CI. This repo is canonical.
# Gate + k3d e2e on every push/PR; on a v* tag, publish the multi-arch image + Helm chart to GHCR.
# Releases are cut here: commit to main, then tag vX.Y.Z — the tag drives the publish job.
name: CI
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: make ci

  e2e:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: make ci-e2e

  # Publish the container image + Helm chart to GHCR on a v* tag.
  #   image: ghcr.io/<owner>/decant:<vX.Y.Z> + :latest
  #   chart: oci://ghcr.io/<owner>/charts/decant  (version X.Y.Z)
  # Auth uses the workflow's GITHUB_TOKEN (packages: write) — no extra secret needed. Packages inherit
  # the repo's visibility: private while the repo is private, public once it is.
  publish:
    runs-on: ubuntu-latest
    needs: [gate, e2e]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: azure/setup-helm@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Publish image + chart
        run: HELM=helm bash scripts/publish.sh
        env:
          REGISTRY: ghcr.io/${{ github.repository_owner }}
          IMAGE_REPO: decant
          CHART_REPO: charts
          REGISTRY_USER: ${{ github.actor }}
          REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
          GIT_SHA: ${{ github.sha }}
          SETUP_BUILDX: "0"   # buildx already configured by docker/setup-buildx-action
