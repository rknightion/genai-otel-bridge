# GitHub Actions CI. This repo is canonical.
# Gate + k3d e2e on every push/PR; on a v* tag, publish the multi-arch image + Helm chart to GHCR.
# Releases are cut here: commit to main, then tag vX.Y.Z — the tag drives the publish job.
name: CI
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # The `make ci` gate, fanned out across parallel jobs so a slow leg (race, envtest) no longer
  # serialises behind the others. Each leg is an independent required check; branch protection
  # requires only the `ci-success` aggregator below, so adding/renaming a leg never touches protection.
  gate:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false   # one failing leg shouldn't cancel the others — we want every failure reported
      matrix:
        include:
          - name: build-vet
            run: make ci-build ci-vet
          - name: lint
            run: make ci-lint ci-lint-acceptance
          - name: test
            run: make ci-test
          - name: race
            run: make ci-race
          - name: acceptance
            run: make ci-acceptance
          - name: envtest
            run: make ci-envtest
          - name: hygiene
            run: make forbidden-words spdx-check helm-lint
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          # zizmor: ignore[cache-poisoning] - test-only job, does not publish artifacts; cache disabled only on publish
          cache: true
      - run: ${{ matrix.run }}
        env:
          # term list for the forbidden-words hygiene guard (kept out of the repo; see scripts/forbidden-words.sh)
          FORBIDDEN_WORDS_PATTERN: ${{ secrets.FORBIDDEN_WORDS_PATTERN }}

  e2e:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          # zizmor: ignore[cache-poisoning] - test-only job, does not publish artifacts; cache disabled only on publish
          cache: true
      - run: make ci-e2e

  # Comprehensive secret scan (complements the forbidden-words guard's curated denylist).
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0          # full history so the scan sees every commit on the branch
          persist-credentials: false
      - name: gitleaks
        env:
          GITLEAKS_VERSION: 8.21.2
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar -xz gitleaks
          ./gitleaks detect --source . --redact --no-banner

  # Single required status check. Branch protection on `main` requires ONLY this job, so the gate's
  # matrix legs (and e2e / secret-scan) can be added or renamed without re-touching protection.
  # It fails if any dependency failed or was cancelled; a legitimately skipped job (e.g. e2e on a
  # workflow_dispatch run) does not fail it. Renovate's automerge waits for this to go green.
  ci-success:
    name: ci-success
    runs-on: ubuntu-latest
    if: always()
    needs: [gate, e2e, secret-scan]
    steps:
      - name: Fail if any required job did not pass
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          echo "A required job failed or was cancelled: ${{ join(needs.*.result, ', ') }}"
          exit 1
      - name: All required jobs passed
        run: |
          echo "ci-success — ${{ join(needs.*.result, ', ') }}"

  # Publish the container image + Helm chart to GHCR on a v* tag.
  #   image: ghcr.io/<owner>/genai-otel-bridge:<vX.Y.Z> + :latest
  #   chart: oci://ghcr.io/<owner>/charts/genai-otel-bridge  (version X.Y.Z)
  # Auth uses the workflow's GITHUB_TOKEN (packages: write) — no extra secret needed. Packages inherit
  # the repo's visibility: private while the repo is private, public once it is.
  publish:
    runs-on: ubuntu-latest
    needs: [ci-success]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          cache: false
      - uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin
      - name: Publish image + chart
        run: HELM=helm bash scripts/publish.sh
        env:
          REGISTRY: ghcr.io/${{ github.repository_owner }}
          IMAGE_REPO: genai-otel-bridge
          CHART_REPO: charts
          REGISTRY_USER: ${{ github.actor }}
          REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
          GIT_SHA: ${{ github.sha }}
          SETUP_BUILDX: "0"   # buildx already configured by docker/setup-buildx-action
