# GitHub Actions CI. This repo is canonical.
# Gate + k3d e2e on every push/PR. The `ci-success` aggregator is the single required check.
# Releases are automated by release-please.yml (which calls publish.yml) — NOT here.
name: CI
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # The `make ci` gate, fanned out across parallel jobs so a slow leg (race, envtest) no longer
  # serialises behind the others. Each leg is an independent required check; branch protection
  # requires only the `ci-success` aggregator below, so adding/renaming a leg never touches protection.
  gate:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false   # one failing leg shouldn't cancel the others — we want every failure reported
      matrix:
        include:
          - name: build-vet
            run: make ci-build ci-vet
          - name: lint
            run: make ci-lint ci-lint-acceptance
          - name: test
            run: make ci-test
          - name: race
            run: make ci-race
          - name: acceptance
            run: make ci-acceptance
          - name: envtest
            run: make ci-envtest
          - name: hygiene
            run: make forbidden-words spdx-check helm-lint tf-validate
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          # zizmor: ignore[cache-poisoning] - test-only job, does not publish artifacts; cache disabled only on publish
          cache: true
      # IaC toolchain for the `tf-validate` hygiene step: OpenTofu (tofu-native), tflint (correctness),
      # and checkov (AWS security posture). Only the hygiene leg needs them.
      - uses: opentofu/setup-opentofu@847eaa4afeb791b06daa46e8eafa8b1b68d7cfb4 # v2.0.1
        if: matrix.name == 'hygiene'
        with:
          tofu_wrapper: false
      - uses: terraform-linters/setup-tflint@b480b8fcdaa6f2c577f8e4fa799e89e756bb7c93 # v6.2.2
        if: matrix.name == 'hygiene'
      - name: install checkov
        if: matrix.name == 'hygiene'
        run: pipx install checkov
      - run: ${{ matrix.run }}
        env:
          # term list for the forbidden-words hygiene guard (kept out of the repo; see scripts/forbidden-words.sh)
          FORBIDDEN_WORDS_PATTERN: ${{ secrets.FORBIDDEN_WORDS_PATTERN }}

  e2e:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          # zizmor: ignore[cache-poisoning] - test-only job, does not publish artifacts; cache disabled only on publish
          cache: true
      - run: make ci-e2e

  # Comprehensive secret scan (complements the forbidden-words guard's curated denylist).
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0          # full history so the scan sees every commit on the branch
          persist-credentials: false
      - name: gitleaks
        env:
          GITLEAKS_VERSION: 8.21.2
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar -xz gitleaks
          ./gitleaks detect --source . --redact --no-banner

  # DynamoDB backend integration tests (coordinate + checkpoint packages + acceptance gate).
  # Runs against dynamodb-local so no live AWS is required. This is a dedicated job (not a matrix
  # leg) because GitHub Actions does not support per-leg service containers on a shared matrix.
  dynamodb-backends:
    runs-on: ubuntu-latest
    services:
      dynamodb:
        image: amazon/dynamodb-local:3.3.0@sha256:d89f8fcc6b1a39cb35976c248ed42a28c66ae00dc043099210f5571e42648ab4
        ports:
          - 8000:8000
    env:
      DYNAMODB_ENDPOINT: http://localhost:8000
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          # zizmor: ignore[cache-poisoning] - test-only job, does not publish artifacts; cache disabled only on publish
          cache: true
      - run: go test ./internal/coordinate/dynamodb/... ./internal/checkpoint/dynamodb/...
      - run: go test -tags acceptance ./internal/app/ -run TestDynamoDB

  # Single required status check. Branch protection on `main` requires ONLY this job, so the gate's
  # matrix legs (and e2e / secret-scan) can be added or renamed without re-touching protection.
  # It fails if any dependency failed or was cancelled; a legitimately skipped job (e.g. e2e on a
  # workflow_dispatch run) does not fail it. Renovate's automerge waits for this to go green.
  ci-success:
    name: ci-success
    runs-on: ubuntu-latest
    if: always()
    needs: [gate, e2e, secret-scan, dynamodb-backends]
    steps:
      - name: Fail if any required job did not pass
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          echo "A required job failed or was cancelled: ${{ join(needs.*.result, ', ') }}"
          exit 1
      - name: All required jobs passed
        run: |
          echo "ci-success — ${{ join(needs.*.result, ', ') }}"
