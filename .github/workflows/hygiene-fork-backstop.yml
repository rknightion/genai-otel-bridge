# Maintainer-side backstop for the forbidden-words hygiene gate on FORK pull requests.
#
# Why this workflow exists (see scripts/forbidden-words-diff.sh's header for the full writeup):
# GitHub never exposes repo secrets to a `pull_request` run triggered from a fork, so on a fork PR
# ci.yml's hygiene leg silently falls back to scanning only the generic credential-shape base pattern —
# the deployment-specific denylist (FORBIDDEN_WORDS_PATTERN) is invisible to it. A fork PR could
# therefore go fully green on `ci-success` and be merged with a banned identifier already in the diff;
# the push-to-main run (which DOES have the secret) only catches it AFTER merge, by which point it's
# permanently in this public repo's (append-only, never-rewritten) history.
#
# The fix: run on `pull_request_target`, which DOES get secrets even for fork-authored PRs, but never
# check out or execute anything from the fork. Instead:
#   1. Check out ONLY this trusted ref's own scripts (no `ref:` override — pull_request_target's default
#      checkout target is the BASE branch, never the PR head).
#   2. Fetch the PR's changed files via the read-only GitHub REST API (data only — a JSON `patch` field
#      per file, never sourced/eval'd/executed) and hand that plain-text diff to
#      scripts/forbidden-words-diff.sh, which greps only the added ('+') lines.
# This never runs a single byte of fork-controlled code — it only ever reads fork-controlled TEXT.
name: hygiene-fork-backstop
on:
  # zizmor: ignore[dangerous-triggers] - deliberate: this is the pull_request_target backstop itself
  # (needed for secret access on fork PRs). It never checks out the PR head or executes fork code — see
  # the header comment above and scripts/forbidden-words-diff.sh for the full safety argument.
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: hygiene-fork-backstop-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  scan-pr-diff:
    name: forbidden-words (fork PR diff)
    runs-on: ubuntu-latest
    # Same-repo (non-fork) PRs already get the real FORBIDDEN_WORDS_PATTERN secret on ci.yml's plain
    # `pull_request` hygiene leg — this backstop exists solely for the fork case, so skip the redundant
    # run there.
    if: github.event.pull_request.head.repo.full_name != github.repository
    steps:
      - name: checkout (base ref only — never the fork's PR head)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: fetch PR diff via the GitHub API (data only, never executed)
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          gh api "repos/${REPO}/pulls/${PR_NUMBER}/files" --paginate \
            --jq '.[] | "--- " + .filename + "\n" + (.patch // "")' > pr-diff.txt

      - name: scan added lines for forbidden terms
        env:
          FORBIDDEN_WORDS_PATTERN: ${{ secrets.FORBIDDEN_WORDS_PATTERN }}
        run: bash scripts/forbidden-words-diff.sh pr-diff.txt
