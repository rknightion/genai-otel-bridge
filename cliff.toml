# git-cliff configuration — generates CHANGELOG.md from Conventional Commits. Run with
# `make changelog VERSION=vX.Y.Z` (next release section) or `git cliff` (whole history).
[changelog]
header = """
# Changelog

All notable changes to decant. Generated from Conventional Commits.
"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}\
- {{ commit.message | upper_first }}
{% endfor %}\
{% endfor %}
"""
trim = true
footer = "<!-- generated by git-cliff -->"

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_parsers = [
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Refactor" },
  { message = "^docs?", group = "Documentation" },
  { message = "^test", group = "Testing" },
  { message = "^build|^ci", group = "Build & CI" },
  { message = "^chore\\(release\\)", skip = true },
  { message = "^chore\\(deps\\)|^build\\(deps\\)", group = "Dependencies" },
  { message = "^chore|^style", skip = true },
  { message = ".*", group = "Other" },
]
protect_breaking_commits = true
filter_commits = false
tag_pattern = "v[0-9]*"
topo_order = false
sort_commits = "oldest"
