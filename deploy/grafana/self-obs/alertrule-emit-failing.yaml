apiVersion: rules.alerting.grafana.app/v0alpha1
kind: AlertRule
metadata:
  name: decant-emit-failing
  annotations:
    grafana.app/folder: decant
  labels:
    grafana.app/folder: decant
spec:
  title: DecantEmitFailing
  # Fatal emit/checkpoint/encoding errors — NOT the benign upstream-fetch (collect) retries which are
  # excluded by the kind filter. These error kinds mean the loop has failed to commit a checkpoint or
  # emit to the OTLP backend after exhausting retries, or encountered a bad encoding / unexpected
  # granularity. Any occurrence of these means data is being lost or the loop is stalled.
  execErrState: Ok
  noDataState: Ok
  for: 5m
  trigger:
    interval: 1m
  labels:
    severity: critical
  annotations:
    summary: "decant {{ $labels.loop }} loop has fatal emit/checkpoint errors"
    description: "decant_emit_errors_total for the {{ $labels.loop }} loop has registered one or more fatal error kinds (retryable_exhausted / checkpoint_load / checkpoint_save / checkpoint_fenced / granularity_unexpected / bad_encoding) in the last 10m. The loop is failing to emit or commit its watermark. Check pod logs and OTLP egress (port 4318/443, Grafana Cloud credentials, network policy). Also check the decant-checkpoints ConfigMap for a corrupt/fenced checkpoint. See deploy/grafana/README.md."
  expressions:
    query:
      datasourceUID: grafanacloud-prom
      queryType: prometheus
      relativeTimeRange: {from: 11m0s, to: 0s}
      model:
        datasource: {type: prometheus, uid: grafanacloud-prom}
        expr: 'sum by (loop) (increase(decant_emit_errors_total{kind=~"retryable_exhausted|checkpoint_load|checkpoint_save|checkpoint_fenced|granularity_unexpected|bad_encoding"}[10m])) > 0'
        instant: true
        range: false
        intervalMs: 1000
        maxDataPoints: 43200
        refId: query
    prometheus_math:
      queryType: math
      model:
        datasource: {type: __expr__, uid: __expr__, name: __expr__}
        expression: 'is_number($query) || is_nan($query) || is_inf($query)'
        type: math
        refId: prometheus_math
        intervalMs: 1000
        maxDataPoints: 43200
    threshold:
      queryType: threshold
      source: true
      model:
        datasource: {type: __expr__, uid: __expr__, name: __expr__}
        expression: prometheus_math
        type: threshold
        refId: threshold
        conditions: [{evaluator: {type: gt, params: [0]}}]
        intervalMs: 1000
        maxDataPoints: 43200
