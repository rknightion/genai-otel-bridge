apiVersion: rules.alerting.grafana.app/v0alpha1
kind: AlertRule
metadata:
  name: genai-otel-bridge-queue-backpressure
  annotations:
    grafana.app/folder: genai-otel-bridge
  labels:
    grafana.app/folder: genai-otel-bridge
spec:
  title: GenaiOtelBridgeQueueBackpressure
  # The per-loop bounded emit queue is reporting a non-zero depth ratio for a sustained 15m — emit
  # cannot keep up with collect and batches are waiting in the queue (backpressure). In normal
  # operation the queue is empty (ratio=0) because emit completes well within the tick interval.
  # Sustained non-zero means OTLP backend is slow/rejecting or the emit retry budget is being hit.
  execErrState: Ok
  noDataState: Ok
  for: 15m
  trigger:
    interval: 1m
  labels:
    severity: warning
  annotations:
    summary: "genai-otel-bridge {{ $labels.loop }} loop emit queue is backing up"
    description: "genai_otel_bridge_queue_depth_ratio for the {{ $labels.loop }} loop has been >0 for 15m — the emit queue is not draining fast enough (backpressure). Healthy operation is depth=0. Check emit latency / OTLP backend availability / genai_otel_bridge_emit_errors_total. A non-draining queue will eventually cause windows to be skipped. See deploy/grafana/README.md."
  expressions:
    query:
      datasourceUID: grafanacloud-prom
      queryType: prometheus
      relativeTimeRange: {from: 16m0s, to: 0s}
      model:
        datasource: {type: prometheus, uid: grafanacloud-prom}
        expr: 'max by (loop) (genai_otel_bridge_queue_depth_ratio) > 0'
        instant: true
        range: false
        intervalMs: 1000
        maxDataPoints: 43200
        refId: query
    prometheus_math:
      queryType: math
      model:
        datasource: {type: __expr__, uid: __expr__, name: __expr__}
        expression: 'is_number($query) || is_nan($query) || is_inf($query)'
        type: math
        refId: prometheus_math
        intervalMs: 1000
        maxDataPoints: 43200
    threshold:
      queryType: threshold
      source: true
      model:
        datasource: {type: __expr__, uid: __expr__, name: __expr__}
        expression: prometheus_math
        type: threshold
        refId: threshold
        conditions: [{evaluator: {type: gt, params: [0]}}]
        intervalMs: 1000
        maxDataPoints: 43200
