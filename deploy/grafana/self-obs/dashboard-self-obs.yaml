                  fillOpacity: 30
                  showPoints: never
                  spanNulls: false
                  axisPlacement: auto
              overrides: []
    panel-162:
      kind: Panel
      spec:
        id: 162
        title: Warn+error logs (15m)
        description: "Count of the poller's own warn/error stdout lines in the last 15m. Inline LogQL \u2014 independent of the metric pipeline, so it still reports if emit is down."
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
            - kind: PanelQuery
              spec:
                hidden: false
                refId: A
                query:
                  kind: DataQuery
                  group: prometheus
                  version: v0
                  datasource:
                    name: ${datasource}
                  spec:
                    editorMode: code
                    expr: '0'
                    legendFormat: ''
                    range: false
                    instant: true
                    exemplar: false
                    format: time_series
            queryOptions: {}
            transformations: []
        vizConfig:
          kind: VizConfig
          group: stat
          spec:
            options:
              colorMode: value
              graphMode: none
              justifyMode: auto
              textMode: auto
              reduceOptions:
                calcs:
                - lastNotNull
                fields: ''
                values: false
              wideLayout: true
              showPercentChange: false
            fieldConfig:
              defaults:
                unit: short
                color:
                  mode: thresholds
                thresholds:
                  mode: absolute
                  steps:
                  - color: text
                    value: null
              overrides: []
    panel-161:
      kind: Panel
      spec:
        id: 161
        title: Poller logs (warn+error)
        description: The integrator's own warn/error stdout. NOT the republished product logs (those are service_namespace=decant, high volume). Drill here when a metric signal fires.
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
            - kind: PanelQuery
              spec:
                hidden: false
                refId: A
                query:
                  kind: DataQuery
                  group: loki
                  version: v0
                  datasource:
                    name: ${loki}
                  spec:
                    editorMode: code
                    expr: '{namespace=~"$namespace", service_name="decant", container="decant"} | detected_level=~"warn|error"'
                    queryType: range
                    maxLines: 1000
            queryOptions: {}
            transformations: []
        vizConfig:
          kind: VizConfig
          group: logs
          spec:
            options:
              showTime: true
              showLabels: false
              wrapLogMessage: true
              prettifyLogMessage: false
              enableLogDetails: true
              dedupStrategy: none
              sortOrder: Descending
            fieldConfig:
              defaults: {}
              overrides: []
    panel-170:
      kind: Panel
      spec:
        id: 170
        title: CPU usage (process_cpu)
        description: Continuous CPU profile of the integrator process (Pyroscope push). decant is near-idle between ticks; spikes align with poll/emit cycles.
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
            - kind: PanelQuery
              spec:
                hidden: false
                refId: A
                query:
                  kind: DataQuery
                  group: grafana-pyroscope-datasource
                  version: v0
                  datasource:
                    name: ${pyroscope}
                  spec:
                    profileTypeId: process_cpu:cpu:nanoseconds:cpu:nanoseconds
                    labelSelector: '{service_name="decant"}'
                    groupBy: []
                    queryType: metrics
            queryOptions: {}
            transformations: []
        vizConfig:
          kind: VizConfig
          group: timeseries
          spec:
            options:
              legend:
                displayMode: list
                placement: bottom
                showLegend: true
              tooltip:
                mode: multi
                sort: desc
            fieldConfig:
              defaults:
                unit: short
                custom:
                  drawStyle: line
                  lineInterpolation: linear
                  lineWidth: 1
                  fillOpacity: 20
                  showPoints: never
                  spanNulls: false
                  axisPlacement: auto
              overrides: []
    panel-171:
      kind: Panel
      spec:
        id: 171
        title: Heap in-use
        description: Live heap (memory:inuse_space). Watch for a sustained climb (leak) vs the sawtooth of normal GC.
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
            - kind: PanelQuery
              spec:
                hidden: false
                refId: A
                query:
                  kind: DataQuery
                  group: grafana-pyroscope-datasource
                  version: v0
                  datasource:
                    name: ${pyroscope}
                  spec:
                    profileTypeId: memory:inuse_space:bytes:space:bytes
                    labelSelector: '{service_name="decant"}'
                    groupBy: []
                    queryType: metrics
            queryOptions: {}
            transformations: []
        vizConfig:
          kind: VizConfig
          group: timeseries
          spec:
            options:
              legend:
                displayMode: list
                placement: bottom
                showLegend: true
              tooltip:
                mode: multi
                sort: desc
            fieldConfig:
              defaults:
                unit: bytes
                custom:
                  drawStyle: line
                  lineInterpolation: linear
                  lineWidth: 1
                  fillOpacity: 20
                  showPoints: never
                  spanNulls: false
                  axisPlacement: auto
              overrides: []
    panel-172:
      kind: Panel
      spec:
        id: 172
        title: Goroutines
        description: Goroutine count. A monotonic climb = a goroutine leak (e.g. a stuck HTTP call to a wedged upstream).
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
            - kind: PanelQuery
              spec:
                hidden: false
                refId: A
                query:
                  kind: DataQuery
                  group: grafana-pyroscope-datasource
                  version: v0
                  datasource:
                    name: ${pyroscope}
                  spec:
                    profileTypeId: goroutines:goroutine:count:goroutine:count
                    labelSelector: '{service_name="decant"}'
                    groupBy: []
                    queryType: metrics
            queryOptions: {}
            transformations: []
        vizConfig:
          kind: VizConfig
          group: timeseries
          spec:
            options:
              legend:
                displayMode: list
                placement: bottom
                showLegend: true
              tooltip:
                mode: multi
                sort: desc
            fieldConfig:
              defaults:
                unit: short
                custom:
                  drawStyle: line
                  lineInterpolation: linear
                  lineWidth: 1
                  fillOpacity: 20
                  showPoints: never
                  spanNulls: false
                  axisPlacement: auto
              overrides: []
    panel-173:
      kind: Panel
      spec:
        id: 173
        title: CPU flame graph
        description: Where the integrator spends CPU. Use to confirm time is in poll/encode/emit and not somewhere unexpected.
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
            - kind: PanelQuery
              spec:
                hidden: false
                refId: A
                query:
                  kind: DataQuery
                  group: grafana-pyroscope-datasource
                  version: v0
                  datasource:
                    name: ${pyroscope}
                  spec:
                    profileTypeId: process_cpu:cpu:nanoseconds:cpu:nanoseconds
                    labelSelector: '{service_name="decant"}'
                    groupBy: []
                    queryType: profile
            queryOptions: {}
            transformations: []
        vizConfig:
          kind: VizConfig
          group: flamegraph
          spec:
            options: {}
            fieldConfig:
              defaults: {}
              overrides: []
