apiVersion: dashboard.grafana.app/v2
kind: Dashboard
metadata:
  name: decant-self-obs
  annotations:
    grafana.app/folder: decant
  labels:
    grafana.app/folder: decant
spec:
  title: "decant \u2014 self-observability"
  description: "Operational health of the decant integrator itself (the decant_* self-metrics, the poller's own stdout logs, and its runtime profiles). Tabbed top-down triage. Staleness is shown self-relative (decant:freshness_ratio: >1 = staler than the loop's own 6h baseline) so one scale serves loops of any cadence. Stack-agnostic: pick the Prometheus/Loki/Pyroscope datasources via the variables. NOTE: emitted/last_success/window_lag are recorded only on a SUCCESSFUL emit (the watermark must leave zero) \u2014 empty there is a real signal that emit is failing, not a broken panel. The freshness/upstream-ratio panels need the self-obs recording rules pushed."
  tags:
  - decant
  - self-obs
  - gcx
  editable: true
  liveNow: false
  preload: false
  cursorSync: Crosshair
  revision: 1
  links: []
  annotations:
  - kind: AnnotationQuery
    spec:
      builtIn: true
      enable: true
      hide: true
      iconColor: rgba(0, 211, 255, 1)
      legacyOptions:
        type: dashboard
      name: Annotations & Alerts
      query:
        kind: DataQuery
        group: grafana
        version: v0
        datasource:
          name: -- Grafana --
        spec: {}
  timeSettings:
    from: now-6h
    to: now
    timezone: browser
    autoRefresh: 1m
    autoRefreshIntervals:
    - 5s
    - 10s
    - 30s
    - 1m
    - 5m
    - 15m
    - 30m
    - 1h
    fiscalYearStartMonth: 0
    hideTimepicker: false
  variables:
  - kind: DatasourceVariable
    spec:
      name: datasource
      label: Prometheus
      pluginId: prometheus
      current:
        text: grafanacloud-prom
        value: grafanacloud-prom
      hide: dontHide
      includeAll: false
      multi: false
      options: []
      regex: ''
      refresh: onDashboardLoad
      skipUrlSync: false
      allowCustomValue: true
  - kind: DatasourceVariable
    spec:
      name: loki
      label: Loki
      pluginId: loki
      current:
        text: grafanacloud-logs
        value: grafanacloud-logs
      hide: dontHide
      includeAll: false
      multi: false
      options: []
      regex: ''
      refresh: onDashboardLoad
      skipUrlSync: false
      allowCustomValue: true
  - kind: DatasourceVariable
    spec:
      name: pyroscope
      label: Pyroscope
      pluginId: grafana-pyroscope-datasource
      current:
        text: grafanacloud-profiles
        value: grafanacloud-profiles
      hide: dontHide
      includeAll: false
      multi: false
      options: []
      regex: ''
      refresh: onDashboardLoad
      skipUrlSync: false
      allowCustomValue: true
  - kind: QueryVariable
    spec:
      name: loop
      label: Loop
      definition: label_values(decant_window_lag_seconds,loop)
      current:
        text:
        - All
        value:
        - $__all
      hide: dontHide
      includeAll: true
      allValue: .+
      multi: true
      options: []
      regex: ''
      sort: alphabeticalAsc
      refresh: onDashboardLoad
      skipUrlSync: false
      allowCustomValue: true
      query:
        kind: DataQuery
        group: prometheus
        version: v0
        datasource:
          name: ${datasource}
        spec:
          query: label_values(decant_window_lag_seconds,loop)
          refId: PrometheusVariableQueryEditor-VariableQuery
  - kind: QueryVariable
    spec:
      name: namespace
      label: Namespace
      definition: label_values({service_name="decant"}, namespace)
      current:
        text:
        - All
        value:
        - $__all
      hide: dontHide
      includeAll: true
      allValue: .+
      multi: true
      options: []
      regex: ''
      sort: alphabeticalAsc
      refresh: onDashboardLoad
      skipUrlSync: false
      allowCustomValue: true
      query:
        kind: DataQuery
        group: loki
        version: v0
        datasource:
          name: ${loki}
        spec:
          query: label_values({service_name="decant"}, namespace)
          refId: LokiVariableQueryEditor-VariableQuery
  elements:
    panel-100:
      kind: Panel
      spec:
        id: 100
        title: Loops healthy
        description: "HEALTHY when no selected loop is staler than 2x its OWN 6h baseline (max freshness_ratio < 2). Self-relative \u2014 won't read STALE just because a slow log-export loop is legitimately tens of minutes behind. Needs the recording rules pushed."
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
            - kind: PanelQuery
              spec:
                hidden: false
                refId: A
                query:
                  kind: DataQuery
                  group: prometheus
                  version: v0
                  datasource:
                    name: ${datasource}
                  spec:
                    editorMode: code
                    expr: max(decant:freshness_ratio{loop=~"$loop"}) < bool 2
                    legendFormat: ''
                    range: false
                    instant: true
                    exemplar: false
                    format: time_series
            queryOptions: {}
            transformations: []
        vizConfig:
          kind: VizConfig
          group: stat
          spec:
            options:
              colorMode: background
              graphMode: none
              justifyMode: auto
              textMode: auto
              reduceOptions:
                calcs:
                - lastNotNull
                fields: ''
                values: false
              wideLayout: true
              showPercentChange: false
            fieldConfig:
              defaults:
                unit: none
                color:
                  mode: thresholds
                thresholds:
                  mode: absolute
                  steps:
                  - color: red
                    value: null
                  - color: green
                    value: 1
                mappings:
                - type: value
                  options:
                    '1':
                      text: HEALTHY
                      color: green
                      index: 1
                    '0':
                      text: STALE
                      color: red
                      index: 0
              overrides: []
    panel-101:
      kind: Panel
      spec:
        id: 101
        title: Leader present
        description: "1 (PRESENT) if any selected loop exported a timestamp in the last 15m. ABSENT => leader gone / never emitted (distinct from stale). Inline \u2014 no recording rule required."
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
            - kind: PanelQuery
              spec:
                hidden: false
                refId: A
                query:
                  kind: DataQuery
                  group: prometheus
                  version: v0
                  datasource:
                    name: ${datasource}
                  spec:
                    editorMode: code
                    expr: max(present_over_time(decant_last_success_timestamp_seconds{loop=~"$loop"}[15m]))
                    legendFormat: ''
                    range: false
                    instant: true
                    exemplar: false
                    format: time_series
            queryOptions: {}
            transformations: []
        vizConfig:
          kind: VizConfig
          group: stat
          spec:
            options:
              colorMode: background
              graphMode: none
              justifyMode: auto
              textMode: auto
              reduceOptions:
                calcs:
                - lastNotNull
                fields: ''
                values: false
              wideLayout: true
              showPercentChange: false
            fieldConfig:
              defaults:
                unit: none
                color:
                  mode: thresholds
                thresholds:
                  mode: absolute
                  steps:
                  - color: red
                    value: null
                  - color: green
                    value: 1
                mappings:
                - type: value
                  options:
                    '1':
                      text: PRESENT
                      color: green
                      index: 0
                - type: special
                  options:
                    match: 'null'
                    result:
                      text: ABSENT
                      color: red
                      index: 1
              overrides: []
    panel-102:
      kind: Panel
      spec:
        id: 102
        title: Replicas emitting
        description: Distinct service_instance_id self-reporting. <2 => no standby (DecantNoStandby). Both active+standby self-emit, so 2 is the healthy HA steady state.
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
            - kind: PanelQuery
              spec:
                hidden: false
                refId: A
                query:
                  kind: DataQuery
                  group: prometheus
                  version: v0
                  datasource:
                    name: ${datasource}
                  spec:
                    editorMode: code
                    expr: count(group by (service_instance_id) (decant_window_lag_seconds))
                    legendFormat: ''
                    range: false
                    instant: true
                    exemplar: false
                    format: time_series
            queryOptions: {}
            transformations: []
        vizConfig:
          kind: VizConfig
          group: stat
          spec:
            options:
              colorMode: value
              graphMode: none
              justifyMode: auto
              textMode: auto
              reduceOptions:
                calcs:
                - lastNotNull
                fields: ''
                values: false
              wideLayout: true
              showPercentChange: false
            fieldConfig:
              defaults:
                unit: short
                color:
                  mode: thresholds
                thresholds:
                  mode: absolute
                  steps:
                  - color: red
                    value: null
                  - color: green
                    value: 2
              overrides: []
    panel-103:
      kind: Panel
      spec:
        id: 103
        title: Worst freshness ratio
        description: 'max(decant:freshness_ratio): each loop''s staleness over its OWN trailing-6h p90 baseline. <1.5 normal, >2 = much staler than this loop''s normal. Uniform scale across loops of any cadence. Needs the recording rules pushed.'
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
            - kind: PanelQuery
              spec:
                hidden: false
                refId: A
                query:
                  kind: DataQuery
                  group: prometheus
                  version: v0
                  datasource:
                    name: ${datasource}
                  spec:
                    editorMode: code
                    expr: max(decant:freshness_ratio{loop=~"$loop"})
                    legendFormat: ''
                    range: false
                    instant: true
                    exemplar: false
                    format: time_series
            queryOptions: {}
            transformations: []
        vizConfig:
          kind: VizConfig
          group: stat
          spec:
            options:
              colorMode: background
              graphMode: area
              justifyMode: auto
              textMode: auto
              reduceOptions:
                calcs:
                - lastNotNull
                fields: ''
                values: false
              wideLayout: true
              showPercentChange: false
            fieldConfig:
              defaults:
                unit: none
                color:
                  mode: thresholds
                thresholds:
                  mode: absolute
                  steps: &id001
                  - color: green
                    value: null
                  - color: yellow
                    value: 1.5
                  - color: red
                    value: 2
              overrides: []
    panel-104:
      kind: Panel
      spec:
        id: 104
        title: Max window lag
        description: now - watermark frontier, worst loop. Floors at ~bucket_settle+cadence by design; a sustained rise = a loop falling behind.
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
            - kind: PanelQuery
              spec:
                hidden: false
                refId: A
                query:
                  kind: DataQuery
                  group: prometheus
                  version: v0
                  datasource:
                    name: ${datasource}
                  spec:
                    editorMode: code
                    expr: max(decant_window_lag_seconds{loop=~"$loop"})
                    legendFormat: ''
                    range: false
                    instant: true
                    exemplar: false
                    format: time_series
            queryOptions: {}
            transformations: []
        vizConfig:
          kind: VizConfig
          group: stat
          spec:
            options:
              colorMode: value
              graphMode: area
              justifyMode: auto
              textMode: auto
              reduceOptions:
                calcs:
                - lastNotNull
                fields: ''
                values: false
              wideLayout: true
              showPercentChange: false
            fieldConfig:
              defaults:
                unit: s
                color:
                  mode: thresholds
                thresholds:
                  mode: absolute
                  steps:
                  - color: green
                    value: null
                  - color: yellow
                    value: 1800
                  - color: red
                    value: 3600
              overrides: []
    panel-105:
      kind: Panel
      spec:
        id: 105
        title: Fatal emit errors (1h)
        description: "sum(increase(decant_emit_errors_total{kind!='collect'}[1h])) \u2014 fatal kinds only (retryable_exhausted / checkpoint_* / bad_encoding); the benign upstream-fetch 'collect' retries are excluded. >0 => emit/commit is failing."
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
            - kind: PanelQuery
              spec:
                hidden: false
                refId: A
                query:
                  kind: DataQuery
                  group: prometheus
                  version: v0
                  datasource:
                    name: ${datasource}
                  spec:
                    editorMode: code
                    expr: (sum(increase(decant_emit_errors_total{loop=~"$loop",kind!="collect"}[1h])) or vector(0))
                    legendFormat: ''
                    range: false
                    instant: true
                    exemplar: false
                    format: time_series
            queryOptions: {}
            transformations: []
        vizConfig:
          kind: VizConfig
          group: stat
          spec:
            options:
              colorMode: background
              graphMode: none
              justifyMode: auto
              textMode: auto
              reduceOptions:
                calcs:
                - lastNotNull
                fields: ''
                values: false
              wideLayout: true
              showPercentChange: false
            fieldConfig:
              defaults:
                unit: short
                color:
                  mode: thresholds
                thresholds:
                  mode: absolute
                  steps:
                  - color: green
                    value: null
                  - color: red
                    value: 1
              overrides: []
    panel-110:
      kind: Panel
      spec:
        id: 110
        title: Freshness ratio by loop (self-relative staleness)
        description: "decant:freshness_ratio per loop. 1.0 = exactly the loop's own 6h-p90 staleness; the lines mark 1 (baseline) and 2 (alert). This is the decoupled, per-loop staleness view \u2014 a flat 15m threshold can't serve loops whose normal ranges from ~2m (sessions) to tens of minutes (runs)."
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
            - kind: PanelQuery
              spec:
                hidden: false
                refId: A
                query:
                  kind: DataQuery
                  group: prometheus
                  version: v0
                  datasource:
                    name: ${datasource}
                  spec:
                    editorMode: code
                    expr: decant:freshness_ratio{loop=~"$loop"}
                    legendFormat: '{{loop}}'
                    range: true
                    instant: false
                    exemplar: false
                    format: time_series
            queryOptions: {}
            transformations: []
        vizConfig:
          kind: VizConfig
          group: timeseries
          spec:
            options:
              legend:
                displayMode: table
                placement: bottom
                showLegend: true
                calcs:
                - lastNotNull
                - max
              tooltip:
                mode: multi
                sort: desc
            fieldConfig:
              defaults:
                unit: none
                custom:
                  drawStyle: line
                  lineInterpolation: linear
                  lineWidth: 1
                  fillOpacity: 10
                  showPoints: never
                  spanNulls: false
                  axisPlacement: auto
                  thresholdsStyle:
                    mode: line
                thresholds:
                  mode: absolute
                  steps:
                  - color: green
                    value: null
                  - color: blue
                    value: 1
                  - color: red
                    value: 2
                color:
                  mode: thresholds
              overrides: []
    panel-111:
      kind: Panel
      spec:
        id: 111
        title: Emitted throughput by loop
        description: rate of metric samples (decant_emitted_total) and log records (decant_emitted_logs_total) successfully emitted, per loop. Zero across all while data exists upstream => emit broken.
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
            - kind: PanelQuery
              spec:
                hidden: false
                refId: A
                query:
                  kind: DataQuery
                  group: prometheus
                  version: v0
                  datasource:
                    name: ${datasource}
                  spec:
                    editorMode: code
                    expr: sum by (loop) (rate(decant_emitted_total{loop=~"$loop"}[$__rate_interval]))
                    legendFormat: '{{loop}} samples'
                    range: true
                    instant: false
                    exemplar: false
                    format: time_series
            - kind: PanelQuery
              spec:
                hidden: false
                refId: B
                query:
                  kind: DataQuery
                  group: prometheus
                  version: v0
                  datasource:
                    name: ${datasource}
                  spec:
                    editorMode: code
                    expr: sum by (loop) (rate(decant_emitted_logs_total{loop=~"$loop"}[$__rate_interval]))
                    legendFormat: '{{loop}} logs'
                    range: true
                    instant: false
                    exemplar: false
                    format: time_series
            queryOptions: {}
            transformations: []
        vizConfig:
          kind: VizConfig
          group: timeseries
          spec:
            options:
              legend:
                displayMode: table
                placement: bottom
                showLegend: true
                calcs:
                - lastNotNull
                - max
              tooltip:
                mode: multi
                sort: desc
            fieldConfig:
              defaults:
                unit: cps
                custom:
                  drawStyle: line
                  lineInterpolation: linear
                  lineWidth: 1
                  fillOpacity: 10
                  showPoints: never
                  spanNulls: false
                  axisPlacement: auto
              overrides: []
    panel-120:
      kind: Panel
      spec:
        id: 120
        title: Window lag by loop
        description: decant_window_lag_seconds per loop (now - watermark frontier). Flat-low is healthy; a sustained climb means the loop is not advancing its watermark.
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
            - kind: PanelQuery
              spec:
                hidden: false
                refId: A
                query:
                  kind: DataQuery
                  group: prometheus
                  version: v0
                  datasource:
                    name: ${datasource}
                  spec:
                    editorMode: code
                    expr: decant_window_lag_seconds{loop=~"$loop"}
                    legendFormat: '{{loop}}'
                    range: true
                    instant: false
                    exemplar: false
                    format: time_series
            queryOptions: {}
            transformations: []
        vizConfig:
          kind: VizConfig
          group: timeseries
          spec:
            options:
              legend:
                displayMode: table
                placement: bottom
                showLegend: true
                calcs:
                - lastNotNull
                - max
              tooltip:
                mode: multi
                sort: desc
            fieldConfig:
              defaults:
                unit: s
                custom:
                  drawStyle: line
                  lineInterpolation: linear
                  lineWidth: 1
                  fillOpacity: 10
                  showPoints: never
                  spanNulls: false
                  axisPlacement: auto
              overrides: []
    panel-121:
      kind: Panel
      spec:
        id: 121
        title: Last-success age vs each loop's baseline
        description: Solid = time() - last_success (age). Dashed = decant:last_success_age:baseline6h (the loop's own 6h-p90 normal). Age sawtoothing under its baseline is healthy; age pulling away above the baseline is the staleness signal DecantPollerStale fires on.
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
            - kind: PanelQuery
              spec:
                hidden: false
                refId: A
                query:
                  kind: DataQuery
                  group: prometheus
                  version: v0
                  datasource:
                    name: ${datasource}
                  spec:
                    editorMode: code
                    expr: time() - max by (loop) (decant_last_success_timestamp_seconds{loop=~"$loop"})
                    legendFormat: '{{loop}} age'
                    range: true
                    instant: false
                    exemplar: false
                    format: time_series
            - kind: PanelQuery
              spec:
                hidden: false
                refId: B
                query:
                  kind: DataQuery
                  group: prometheus
                  version: v0
                  datasource:
                    name: ${datasource}
                  spec:
                    editorMode: code
                    expr: decant:last_success_age:baseline6h{loop=~"$loop"}
                    legendFormat: '{{loop}} baseline'
                    range: true
                    instant: false
                    exemplar: false
                    format: time_series
            queryOptions: {}
            transformations: []
        vizConfig:
          kind: VizConfig
          group: timeseries
          spec:
            options:
              legend:
                displayMode: table
                placement: bottom
                showLegend: true
                calcs:
                - lastNotNull
                - max
              tooltip:
                mode: multi
                sort: desc
            fieldConfig:
              defaults:
                unit: s
                custom:
                  drawStyle: line
                  lineInterpolation: linear
                  lineWidth: 1
                  fillOpacity: 10
                  showPoints: never
                  spanNulls: false
                  axisPlacement: auto
              overrides: []
    panel-122:
      kind: Panel
      spec:
        id: 122
        title: Replicas self-reporting over time
        description: Distinct service_instance_id. 2 = healthy active/passive HA; a drop to 1 = no standby (failover gap risk); a spike >2 sustained = leader overlap.
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
            - kind: PanelQuery
              spec:
                hidden: false
                refId: A
                query:
                  kind: DataQuery
                  group: prometheus
                  version: v0
                  datasource:
                    name: ${datasource}
                  spec:
                    editorMode: code
                    expr: count(group by (service_instance_id) (decant_window_lag_seconds))
                    legendFormat: replicas
                    range: true
                    instant: false
                    exemplar: false
                    format: time_series
            queryOptions: {}
            transformations: []
        vizConfig:
          kind: VizConfig
          group: timeseries
          spec:
            options:
              legend:
                displayMode: table
                placement: bottom
                showLegend: true
                calcs:
                - lastNotNull
                - min
              tooltip:
                mode: multi
                sort: desc
            fieldConfig:
              defaults:
                unit: short
                custom:
                  drawStyle: line
                  lineInterpolation: linear
                  lineWidth: 1
                  fillOpacity: 10
                  showPoints: never
                  spanNulls: false
                  axisPlacement: auto
              overrides: []
    panel-123:
      kind: Panel
      spec:
        id: 123
        title: Freshness ratio
        description: Per-loop staleness vs the loop's own 6h baseline (repeats once per selected loop). Green <1.5, red >2.
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
            - kind: PanelQuery
              spec:
                hidden: false
                refId: A
                query:
                  kind: DataQuery
                  group: prometheus
                  version: v0
                  datasource:
                    name: ${datasource}
                  spec:
                    editorMode: code
                    expr: decant:freshness_ratio{loop="$loop"}
                    legendFormat: ''
                    range: false
                    instant: true
                    exemplar: false
                    format: time_series
            queryOptions: {}
            transformations: []
        vizConfig:
          kind: VizConfig
          group: gauge
          spec:
            options:
              reduceOptions:
                calcs:
                - lastNotNull
                fields: ''
                values: false
              showThresholdLabels: false
              showThresholdMarkers: true
            fieldConfig:
              defaults:
                unit: none
                color:
                  mode: thresholds
                thresholds:
                  mode: absolute
                  steps: *id001
              overrides: []
    panel-130:
      kind: Panel
      spec:
        id: 130
        title: Emitted samples /s by loop
        description: rate(decant_emitted_total). Metric data points successfully emitted.
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
            - kind: PanelQuery
              spec:
                hidden: false
                refId: A
                query:
                  kind: DataQuery
                  group: prometheus
                  version: v0
                  datasource:
                    name: ${datasource}
                  spec:
                    editorMode: code
                    expr: sum by (loop) (rate(decant_emitted_total{loop=~"$loop"}[$__rate_interval]))
                    legendFormat: '{{loop}}'
                    range: true
                    instant: false
                    exemplar: false
                    format: time_series
            queryOptions: {}
            transformations: []
        vizConfig:
          kind: VizConfig
          group: timeseries
          spec:
            options:
              legend:
                displayMode: table
                placement: bottom
                showLegend: true
                calcs:
                - lastNotNull
                - max
              tooltip:
                mode: multi
                sort: desc
            fieldConfig:
              defaults:
                unit: cps
                custom:
                  drawStyle: line
                  lineInterpolation: linear
                  lineWidth: 1
                  fillOpacity: 10
                  showPoints: never
                  spanNulls: false
                  axisPlacement: auto
              overrides: []
    panel-131:
      kind: Panel
      spec:
        id: 131
        title: Emitted logs /s by loop
        description: 'rate(decant_emitted_logs_total). Log records emitted (logs loops: logs_export, runs).'
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
            - kind: PanelQuery
              spec:
                hidden: false
                refId: A
                query:
                  kind: DataQuery
                  group: prometheus
                  version: v0
                  datasource:
                    name: ${datasource}
                  spec:
                    editorMode: code
                    expr: sum by (loop) (rate(decant_emitted_logs_total{loop=~"$loop"}[$__rate_interval]))
                    legendFormat: '{{loop}}'
                    range: true
                    instant: false
                    exemplar: false
                    format: time_series
            queryOptions: {}
            transformations: []
        vizConfig:
          kind: VizConfig
          group: timeseries
          spec:
            options:
              legend:
                displayMode: table
                placement: bottom
                showLegend: true
                calcs:
                - lastNotNull
                - max
              tooltip:
