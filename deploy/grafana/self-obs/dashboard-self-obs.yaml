                  showPoints: never
                  spanNulls: false
                  axisPlacement: auto
              overrides: []
    panel-26:
      kind: Panel
      spec:
        id: 26
        title: Guard dropped /s by loop (governance)
        description: rate(aip_oi_guard_dropped_total). Data points / logs dropped by the cardinality/content governance Guard (default-deny label allow-list, field denylist).
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
            - kind: PanelQuery
              spec:
                hidden: false
                refId: A
                query:
                  kind: DataQuery
                  group: prometheus
                  version: v0
                  datasource:
                    name: ${datasource}
                  spec:
                    editorMode: code
                    expr: sum by (loop) (rate(aip_oi_guard_dropped_total{loop=~"$loop"}[$__rate_interval]))
                    legendFormat: '{{loop}}'
                    range: true
                    instant: false
                    exemplar: false
                    format: time_series
            queryOptions: {}
            transformations: []
        vizConfig:
          kind: VizConfig
          group: timeseries
          spec:
            options:
              legend:
                displayMode: table
                placement: bottom
                showLegend: true
                calcs:
                - lastNotNull
                - max
              tooltip:
                mode: multi
                sort: desc
            fieldConfig:
              defaults:
                unit: cps
                custom:
                  drawStyle: line
                  lineInterpolation: linear
                  lineWidth: 1
                  fillOpacity: 10
                  showPoints: never
                  spanNulls: false
                  axisPlacement: auto
              overrides: []
    panel-27:
      kind: Panel
      spec:
        id: 27
        title: Buckets revised after settle /s
        description: rate(aip_oi_bucket_revised_after_settle_total). A bucket changed value after the settle window (late arrivals beyond bucket_settle). Persistent non-zero => widen bucket_settle.
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
            - kind: PanelQuery
              spec:
                hidden: false
                refId: A
                query:
                  kind: DataQuery
                  group: prometheus
                  version: v0
                  datasource:
                    name: ${datasource}
                  spec:
                    editorMode: code
                    expr: sum by (loop) (rate(aip_oi_bucket_revised_after_settle_total{loop=~"$loop"}[$__rate_interval]))
                    legendFormat: '{{loop}}'
                    range: true
                    instant: false
                    exemplar: false
                    format: time_series
