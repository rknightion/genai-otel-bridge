apiVersion: rules.alerting.grafana.app/v0alpha1
kind: RecordingRule
metadata:
  name: aipoi-scrape-healthy
  annotations:
    grafana.app/folder: aip-oi
  labels:
    grafana.app/folder: aip-oi
spec:
  title: aip_oi:scrape_healthy
  metric: aip_oi:scrape_healthy
  targetDatasourceUID: grafanacloud-prom
  trigger:
    interval: 1m
  expressions:
    query:
      datasourceUID: grafanacloud-prom
      queryType: prometheus
      source: true
      relativeTimeRange: {from: 5m0s, to: 0s}
      model:
        datasource: {type: prometheus, uid: grafanacloud-prom}
        # `< bool 900` => 1 (healthy) / 0 (stale). WITHOUT bool this is a filter that records the
        # age value (e.g. 720) for healthy loops and drops stale ones, breaking the `== 1` usage.
        expr: '(time() - max by (loop) (aip_oi_last_success_timestamp_seconds)) < bool 900'
        instant: true
        range: false
        intervalMs: 1000
        maxDataPoints: 43200
        refId: query
