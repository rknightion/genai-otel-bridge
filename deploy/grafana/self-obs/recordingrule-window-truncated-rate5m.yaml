apiVersion: rules.alerting.grafana.app/v0alpha1
kind: RecordingRule
metadata:
  name: decant-window-truncated-rate5m
  annotations:
    grafana.app/folder: decant
  labels:
    grafana.app/folder: decant
spec:
  title: decant:window_truncated:rate5m
  metric: decant:window_truncated:rate5m
  targetDatasourceUID: grafanacloud-prom
  trigger:
    interval: 1m
  expressions:
    query:
      datasourceUID: grafanacloud-prom
      queryType: prometheus
      source: true
      relativeTimeRange: {from: 6m0s, to: 0s}
      model:
        datasource: {type: prometheus, uid: grafanacloud-prom}
        expr: 'sum by (loop) (rate(decant_source_graph_unavailable_total{graph="window_truncated"}[5m]))'
        instant: true
        range: false
        intervalMs: 1000
        maxDataPoints: 43200
        refId: query
