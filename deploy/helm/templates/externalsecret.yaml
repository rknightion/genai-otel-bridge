{{- if .Values.externalSecrets.enabled }}
{{- /*
  Render-time validation. ESO cannot fetch a secret whose remoteRef.key is empty — an empty key makes
  the whole ExternalSecret fail to sync and the target Secret is never created, so all pods sit in
  CreateContainerConfigError. Fail loudly at render time instead, for the values values.yaml documents
  as "Required when externalSecrets.enabled is true", plus the self-obs Grafana Cloud credential secrets
  (always needed — the app self-observes). Vendor API-key secrets are OPTIONAL per-vendor (Portkey-only
  or LangSmith-only deployments), so those are gated below rather than required — but at least one must
  be set.
*/ -}}
{{- if not .Values.aws.region }}{{ fail "externalSecrets.enabled=true requires aws.region (the SecretStore provider region)" }}{{- end }}
{{- if not .Values.serviceAccount.esoName }}{{ fail "externalSecrets.enabled=true requires serviceAccount.esoName (the IRSA/workload-identity SA the SecretStore authenticates as)" }}{{- end }}
{{- if not .Values.externalSecrets.grafanaConfigSecret }}{{ fail "externalSecrets.enabled=true requires externalSecrets.grafanaConfigSecret (Grafana Cloud connection config: otlp-url + otlp-username)" }}{{- end }}
{{- if not .Values.externalSecrets.grafanaSelfTokenSecret }}{{ fail "externalSecrets.enabled=true requires externalSecrets.grafanaSelfTokenSecret (self-observability OTLP access-policy token)" }}{{- end }}
{{- if and (not .Values.externalSecrets.portkeySecret) (not .Values.externalSecrets.langsmithSecret) }}{{ fail "externalSecrets.enabled=true requires at least one source API-key secret: set externalSecrets.portkeySecret and/or externalSecrets.langsmithSecret" }}{{- end }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: genai-otel-bridge-externalsecret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "genai-otel-bridge.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: aws-secretsmanager
    kind: SecretStore

  target:
    name: genai-otel-bridge-secrets
    creationPolicy: Owner

  data:
{{- if .Values.externalSecrets.grafanaProductTokenSecret }}
    # ── Product Grafana Cloud OTLP credentials ────────────────────────────────
    # Rendered only when grafanaProductTokenSecret is set — i.e. the product plane emits DIRECT to
    # Grafana Cloud. Omit the product token secret (set it "") for the in-cluster-collector topology
    # where product telemetry is emitted token-less to a local Alloy that holds the real GC creds; then
    # these GC_OTLP_* keys are not provisioned (the config carries no product credential refs).
    - secretKey: GC_OTLP_ENDPOINT
      remoteRef:
        key: {{ .Values.externalSecrets.grafanaConfigSecret }}
        property: otlp-url
    - secretKey: GC_INSTANCE_ID
      remoteRef:
        key: {{ .Values.externalSecrets.grafanaConfigSecret }}
        property: otlp-username
    - secretKey: GC_OTLP_TOKEN
      remoteRef:
        key: {{ .Values.externalSecrets.grafanaProductTokenSecret }}
        property: token
{{- end }}

    # ── Self-observability Grafana Cloud OTLP credentials ────────────────────
    # GC_SELF_OTLP_ENDPOINT / GC_SELF_OTLP_INSTANCE_ID / GC_SELF_OTLP_TOKEN feed the emit.self.otlp
    # block in the runtime config — the app consumes them only when self-obs is configured.
    - secretKey: GC_SELF_OTLP_ENDPOINT
      remoteRef:
        key: {{ .Values.externalSecrets.grafanaConfigSecret }}
        property: otlp-url
    - secretKey: GC_SELF_OTLP_INSTANCE_ID
      remoteRef:
        key: {{ .Values.externalSecrets.grafanaConfigSecret }}
        property: otlp-username
    - secretKey: GC_SELF_OTLP_TOKEN
      remoteRef:
        key: {{ .Values.externalSecrets.grafanaSelfTokenSecret }}
        property: token
{{- if .Values.profiling.enabled }}

    # ── Self-observability Grafana Cloud Profiles (Pyroscope) credentials ─────
    # Rendered only when profiling.enabled (push mode). Profiles share the self-obs IDENTITY: the same
    # instance ID (otlp-username) and the SAME self access-policy token as self metrics/logs/traces —
    # only the ingest URL differs (Grafana Cloud serves profiles on a distinct host). Requires the
    # grafanaConfigSecret to carry a `pyroscope-url` property and the self token to include profiles:write.
    - secretKey: GC_PYROSCOPE_URL
      remoteRef:
        key: {{ .Values.externalSecrets.grafanaConfigSecret }}
        property: pyroscope-url
    - secretKey: GC_PYROSCOPE_USER
      remoteRef:
        key: {{ .Values.externalSecrets.grafanaConfigSecret }}
        property: otlp-username
    - secretKey: GC_PYROSCOPE_PASSWORD
      remoteRef:
        key: {{ .Values.externalSecrets.grafanaSelfTokenSecret }}
        property: token
{{- end }}

    # ── Source API credentials (secret material only) ─────────────────────────
    # Only the API keys are secret. Non-secret source config (PORTKEY_EXPECTED_WORKSPACE,
    # LANGSMITH_BASE_URL) and ENV are supplied as literal env in the Deployment (runtimeEnv), NOT via
    # ESO — the backing Secrets Manager secrets hold only `api_key` (portkey/langsmith) / `token` (gc).
    # Rendered per-vendor: a Portkey-only deployment omits the LangSmith entry (and vice versa), so ESO
    # never sees an empty remoteRef.key. At least one is guaranteed set by the render-time check above.
{{- if .Values.externalSecrets.portkeySecret }}
    - secretKey: PORTKEY_API_KEY
      remoteRef:
        key: {{ .Values.externalSecrets.portkeySecret }}
        property: api_key
{{- end }}
{{- if .Values.externalSecrets.langsmithSecret }}
    - secretKey: LANGSMITH_API_KEY
      remoteRef:
        key: {{ .Values.externalSecrets.langsmithSecret }}
        property: api_key
{{- end }}
{{- end }}
