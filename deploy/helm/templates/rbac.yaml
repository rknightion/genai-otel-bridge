---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: decant
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "decant.labels" . | nindent 4 }}

---
# Namespaced Role (NOT ClusterRole) — decant only needs access to resources in its own
# namespace: Leases for leader election, and ConfigMaps for the watermark checkpoint.
# ARCHITECTURE.md §8: keep RBAC minimal and namespace-scoped.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: decant
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "decant.labels" . | nindent 4 }}
rules:
  # Lease leader election (coordination.k8s.io/leases). create is unscoped because RBAC resourceNames
  # cannot gate create (the object name does not exist yet); get/update are scoped to the single lease.
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs:
      - create
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    resourceNames:
      - decant-leader
    verbs:
      - get
      - update

  # ConfigMap watermark checkpoint. Same pattern: create unscoped (resourceNames can't gate create),
  # get/update scoped to the checkpoint ConfigMap only — so the pod can NOT read/modify its own
  # decant-config (or any other ConfigMap) in the namespace.
  - apiGroups:
      - ""
    resources:
      - configmaps
    verbs:
      - create
  - apiGroups:
      - ""
    resources:
      - configmaps
    resourceNames:
      - decant-checkpoints
    verbs:
      - get
      - update

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: decant
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "decant.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: decant
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: decant
  apiGroup: rbac.authorization.k8s.io
