{{- if .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: aws-secretsmanager
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "genai-otel-bridge.labels" . | nindent 4 }}
spec:
  provider:
    aws:
      service: SecretsManager
      # No silent default — a wrong region only fails at ESO sync time, not render time. aws.region is
      # validated as required in externalsecret.yaml (rendered in the same pass), so it is non-empty here.
      region: {{ .Values.aws.region | required "externalSecrets.enabled=true requires aws.region (the SecretStore provider region)" }}
      auth:
        jwt:
          serviceAccountRef:
            name: {{ .Values.serviceAccount.esoName }}
{{- end }}
