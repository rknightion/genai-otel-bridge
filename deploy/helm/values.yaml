# Extra sidecar containers / volumes (e.g. an e2e loopback OTLP sink). Default: none.
extraContainers: []
extraVolumes: []

# Share the pod PID namespace. Off in production (security). The e2e turns it on so a debug
# sidecar can SIGSTOP the integrator process (PID 1 is unsignalable from its own namespace).
shareProcessNamespace: false

# Opt-in self-profiling (continuous profiling of the integrator's own runtime). Default off.
# pull  → exposes net/http/pprof on profiling.pullPort for an Alloy/k8s-monitoring pod scrape (no new egress).
# push  → the pyroscope-go agent pushes to Grafana Cloud Profiles (needs networkPolicy.profilesEgressCIDR).
# NOTE: the chart does NOT template the runtime config from these values — enabling profiling here only
# opens the container/service port (pull) or the egress CIDR (push). The actual selfobs.profiling block
# lives in the configmap baked default (or a `config:` override) and pullPort must match its pull.addr port.
profiling:
  enabled: false
  mode: pull
  pullPort: 6060

# Uninstall cleanup. The binary creates the leader-election Lease and the watermark-checkpoint
# ConfigMap at runtime, so `helm uninstall` does not track them and would orphan them. When enabled
# (default), a post-delete hook Job runs `genai-otel-bridge -cleanup` (under a dedicated, delete-only, ephemeral
# ServiceAccount/Role) to remove them, leaving the namespace clean.
cleanup:
  enabled: true
  # retainCheckpoint: keep the checkpoint ConfigMap on uninstall so a later reinstall RESUMES the
  # watermark instead of re-bootstrapping (the durable-state-survives-uninstall pattern, like Helm not
  # deleting PVCs). The lease is always removed regardless — it is pure ephemeral coordination state.
  # When true, the cleanup hook also drops the configmap-delete grant from its Role (tighter scope).
  retainCheckpoint: false

# ── AWS / External Secrets Operator (ESO) ──────────────────────────────────────
# Optional. When externalSecrets.enabled is true, the chart renders a SecretStore + ExternalSecret
# (templates/secretstore.yaml, templates/externalsecret.yaml) that build the genai-otel-bridge-secrets Secret
# from a cloud secrets manager instead of requiring it to be hand-created. Default OFF — the chart
# renders exactly as before (the Secret must be created out-of-band and is read via envFrom).

# AWS region for the SecretStore provider. Required when externalSecrets.enabled is true.
aws:
  region: ""

# ServiceAccount references. The Deployment's own ServiceAccount (genai-otel-bridge) is created by rbac.yaml.
# esoName names a SEPARATE, IRSA/workload-identity-annotated SA used ONLY by the ESO SecretStore for
# IAM-based secrets-manager access; it is provisioned out-of-band (e.g. by infra IaC), not by this
# chart. Required when externalSecrets.enabled is true.
serviceAccount:
  esoName: ""

# External Secrets Operator integration. Each *Secret value is the NAME of a secrets-manager secret
# (not an ARN). The ExternalSecret maps these into the genai-otel-bridge-secrets k8s Secret consumed via envFrom.
externalSecrets:
  # enabled: render the SecretStore + ExternalSecret. Default OFF (out-of-band Secret as before).
  enabled: false
  # Connection config secret. Properties: otlp-url, otlp-username (shared by product + self-obs OTLP),
  # and — when profiling.enabled — pyroscope-url (the Grafana Cloud Profiles ingest URL; the self-profiling
  # GC_PYROSCOPE_* keys reuse otlp-username as the instance ID and the self token below as the password).
  grafanaConfigSecret: ""
  # Access-policy token secret for PRODUCT telemetry (property: token). Set this ONLY when the product
  # plane emits DIRECT to Grafana Cloud — then the GC_OTLP_* keys are provisioned. Leave "" for the
  # in-cluster-collector topology (product → a local Alloy holding the GC creds, token-less); the product
  # GC_OTLP_* keys are then omitted from the ExternalSecret.
  grafanaProductTokenSecret: ""
  # Access-policy token secret for SELF-OBS telemetry (property: token). Backs GC_SELF_OTLP_TOKEN and,
  # when profiling.enabled, GC_PYROSCOPE_PASSWORD (its scope must include profiles:write).
  grafanaSelfTokenSecret: ""
  # Portkey API key secret (property: api_key).
  portkeySecret: ""
  # LangSmith API key secret (property: api_key).
  langsmithSecret: ""

# ── Runtime env (non-secret, environment-specific) ─────────────────────────────
# Literal values injected as plain container env vars (NOT via the secret) to satisfy the ${ENV} refs
# in config.yaml. Each is rendered ONLY when non-empty — when empty (the default), nothing is emitted
# and the corresponding var keeps coming from the genai-otel-bridge-secrets Secret via envFrom (unchanged
# behaviour for the hand-created-secret path).
runtimeEnv:
  # ENV — deployment environment label (identity.deployment_environment) and the source_instance
  # suffix (portkey-${ENV}, langsmith-${ENV}).
  env: ""
  # PORTKEY_EXPECTED_WORKSPACE — Portkey workspace SLUG for the key scope-assert; empty disables it.
  portkeyExpectedWorkspace: ""
  # LANGSMITH_BASE_URL — self-hosted LangSmith endpoint; MUST include /api/v1.
  langsmithBaseUrl: ""
